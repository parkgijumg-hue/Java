<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      function callTimes(a, callback) {
        for (let i = 0; i < a; i++) {
          callback();
        }
      }
      //   callTimes(3, function () {
      //     alert('함수 호출');
      //   });
      callTimes(3, () => {
        alert('함수 호출');
      });

      // => 는 같은 의미임
    </script>
  </head>
  <body></body>
</html>
