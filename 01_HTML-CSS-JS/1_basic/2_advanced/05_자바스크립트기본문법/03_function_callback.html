<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      function callTimes(a, callback) {
        for (let i = 0; i < a; i++) {
          callback();
        }
      }
      function call() {
        alert('함수 호출');
      }
      callTimes(3, call);
    </script>
  </head>
  <body></body>
</html>

<!-- 다시한번더해보기
callback 은 예약어가  아니라이름은 무엇으로 해도 상관없음
 사용하는 이유는 함수끼리 서로 연관시켜 사용하고싶을때 사용 한번에 작성할 수도 있지만
     callTimes 라는 반복만 수행하는 함수를 만들어서
       추후 call 함수 말고 다른 함수를 반복시키려할때 단순히 callTimes(새로운함수) 이러면 됨 -->
