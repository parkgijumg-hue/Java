<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>회원가입</legend>
        <table>
        
          <tr>
            <th><label for="name">사용자 ID</label></th>
            <td><input type="text" id="name" /></td>
          </tr>
       
          <tr>
            <th><label for="password">비밀번호</label></th>
            <td><input type="password" id="password" /></td>
          </tr>
        
        
          <tr>
            <th><label for="password c">비밀번호 확인</label></th>
            <td><input type="password" id="password c" /></td>
          </tr>
      
        <tr>
         
            <tr>
              <th><label for="rname">이름</label></th>
              <td><input type="text" id="rname" /></td>
            </tr>
         
        </tr>

        <tr>
          <th>성별</th>
          <td>
            <input type="radio" name="gender" value="male" />남
            <input type="radio" name="gender" value="female" />여
          </td>
        </tr>
       
          <tr>
            <th>취미</th>
            <td>
              <input type="checkbox" name="hobby" value="soccer" /> 축구
              <input type="checkbox" name="hobby" value="baseball" /> 야구
              <input type="checkbox" name="hobby" value="volleyboall" /> 배구
              <input type="checkbox" name="hobby" value="basketball" /> 농구
            </td>
          </tr>
       
          <tr>
            <th>email</th>
            <td><input type="email" name="email" /></td>
          </tr>
        
          <tr>
            <th>역할</th>
            <td>
              <select name="role">
                <option value="ADMIN">ADMIN</option>
                <option value="MANAGER">관리자</option>
                <option value="MEMBER">일반회원</option>
              </select>
            </td>
          </tr>
        
        </table>
        <input type="submit" value="확인">
        <input type="reset" value="다시쓰기">
      </fieldset>
    </form>
  </body>
</html>
