<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      window.onload = function () {
        //속성을 지정합니다. 속성 = ex) id,class ...
        document.body.setAttribute('data-custom', 'value');
        //요소.setAttribute("속성명","속성값")
        // -> 해동 요소에 속성명 = "속성값" 으로 추가.
        // -> < data-custom="value">

        //속성을 추출합니다.
        let data = document.body.getAttribute('data-custom');
        //요소.getAttribute("속성명")  : 속성값 얻어오기
        // 즉 value 가 data에 담김
        alert(data);
      };
    </script>
  </head>
  <body data-custom="value">
    <div>practice</div>
    <script>
      //문서에서 div 선택하기
      const div = document.querySelector('div');
      // document.getElementsByTagName('div');
      // get~ 에서 복수형태 or  query~ 는 얻어오는 요소가 하나여도 배열에  담긴다.
      // -> index  번호 즉 [] 를 꼭 사용해야 한다.

      // id,class 속성에 속성값 추가하기.
      //div 태그에 id 속성 추가 - id 명: practice
      document.div.setAttribute('id', 'practice');
      //div 태그에 class 속성 추가 - class명:pr
      document.div.setAttribute('class', 'pr');
    </script>
  </body>
</html>
