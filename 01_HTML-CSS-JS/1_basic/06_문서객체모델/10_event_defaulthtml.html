  <body>
    <a href="https://www.naver.com" id="button">버튼</a>
    <script>
      //표준 이벤트 모델 방식
      document
        .getElementById('button')
        .addEventListener('click', function (event) {
          console.log(event); // 이벤트와 관련된 정보 출력
          console.log(event.target); // 이벤트가 발생한 요소 출력
          //매개변수 이벤트가 무조건 있어야 실행됨 -> function(event/해당 부분이 필수)
          //event = e 둘이 똑같은의미

          //기본 이벤트 제거합니다.
          event.preventDefault();
          // return false; 랑 같은 의미 그러나 리스너(표준 이벤트 모델)를 쓸때는 사용불가
          // alert('zz')
        });
    </script>
