<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      //이벤트를 연결합니다.
      window.onload = function () {
        //문서 객체를 선택합니다.
        let header = document.querySelectorAll('h1');
        //요소를 여러 개 접근하는 경우 [배열] 형태로 반환됨
        //->배열 내의 요소에 css,이벤트 등을 적용하고 싶으면
        //인덱스 번호를 이용하여 요소 하나에 직접 적용해야 한다.
        for (let i = 0; i < header.length; i++) {
          //변수를 선언합니다.
          let headers = header[i];
          //문서 객체를 조작합니다.
          headers.style.color = 'orange';
          headers.style.background = 'red';
          headers.innerHTML = 'From JavaScript';
        }
      };
    </script>
  </head>

  <body>
    <h1>Header</h1>
    <h1>Header</h1>
    <h1>Header</h1>
  </body>
</html>
