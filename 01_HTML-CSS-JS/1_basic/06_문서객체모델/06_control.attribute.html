<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      window.onload = function () {
        let image = document.getElementById('image');
        //속성을 변경합니다.
        image.src =
          'https://search.pstatic.net/common/?src=http%3A%2F%2Fimgnews.naver.net%2Fimage%2F5370%2F2021%2F08%2F19%2F0000089508_003_20210819141223951.jpg&type=sc960_832';
        // https://placehold.co/300x200 -> 초안 작성할때 사진대용으로 사용가능
        image.width = '300';
        image.height = '200';
      };
    </script>
  </head>
  <body>
    <img id="image" />
  </body>
</html>
