<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      window.onload = function () {
        //1초마다 함수를 실행합니다.
        let clock = document.getElementById('clock');

        setInterval(() => {
          let now = new Date();
          clock.innerHTML = now.toString();
        }, 1000);

        // setInterval(함수,지연시간(ms))
        // ->  지연시간 후 함수 실행
      };
    </script>
  </head>
  <body>
    <h1 id="clock"></h1>
  </body>
</html>
