<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      let r = 10;
      const pi = 3.141592625;
      let wi = pi * r * r;
      alert(wi);
      //  변수 Pi활용한 값

      alert(r * r * Math.PI);
      // Math 함수 이용하여 정확한 pi 값
    </script>
  </head>
